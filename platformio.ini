; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[common]
lib_deps = 
	ProtoTracer
	SPI
	Wire
	EEPROM
	adafruit/Adafruit Unified Sensor@^1.1.4
	paulstoffregen/OctoWS2811@^1.4
	adafruit/Adafruit BNO055@^1.4.3
	powerbroker2/SerialTransfer@^3.1.2
	adafruit/Adafruit APDS9960 Library@^1.2.2
	pixelmatix/SmartMatrix@^4.0.3
	adafruit/Adafruit BusIO@^1.11.3
	pedvide/Teensy_ADC@^9.1.0
	adafruit/Adafruit SSD1306@^2.5.7
	adafruit/Adafruit seesaw Library@^1.6.3
	adafruit/Adafruit MMC56x3@^1.0.0

[env:teensy40hub75]
extends = common
platform = teensy
board = teensy40
framework = arduino
monitor_speed = 115200
build_flags =
    -D PROJECT_PROTOGEN_HUB75
    -D TEENSY_OPT_FASTEST_LTO

[env:hub75simulation]
extends = common
platform = native
build_flags = 
    -I simulation
    -I lib/ProtoTracer
    -I include
    -I ".pio/libdeps/hub75Simulation/Adafruit APDS9960 Library"
    -I ".pio/libdeps/hub75Simulation/Adafruit BNO055"
    -I ".pio/libdeps/hub75Simulation/Adafruit BusIO"
    -I ".pio/libdeps/hub75Simulation/Adafruit GFX Library"
    -I ".pio/libdeps/hub75Simulation/Adafruit MMC56x3"
    -I ".pio/libdeps/hub75Simulation/Adafruit seesaw Library"
    -I ".pio/libdeps/hub75Simulation/Adafruit SSD1306"
    -I ".pio/libdeps/hub75Simulation/Adafruit Unified Sensor"
    -I ".pio/libdeps/hub75Simulation/APDS-9930 Ambient Light and Proximity Sensor"
    -I ".pio/libdeps/hub75Simulation/OctoWS2811"
    -I ".pio/libdeps/hub75Simulation/SerialTransfer/src"
    -I ".pio/libdeps/hub75Simulation/NTPClient"

    -lSDL2

    -D PROJECT_PROTOGEN_HUB75
    -D TEENSY_OPT_FASTEST_LTO
    -D SIMULATION_MODE
    -D TEENSYDUINO=159
    -D ARDUINO=100

build_src_filter =
    +<*> +<../lib/ProtoTracer/**/*.cpp> +<../simulation/*>

lib_deps = 
    ArduinoFake

