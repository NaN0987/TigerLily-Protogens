[platformio]
description = This project is a 3D ray-tracing and animation engine for pixel matrices, designed to be used for drawing live animations on Protogen style characters from 3D object files (.OBJ).
default_envs = teensy40hub75, teensy40ws35, teensy40beta, teensy40verifyrender, teensy40verifyhardware, teensy41hub75, teensy41ws35, teensy41beta, teensy41verifyrender, teensy41verifyhardware, hub75simulation
test_dir = test
